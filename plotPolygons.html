<script>

<style>
body { margin:0; }
.wrap{
  width:min(600px,95vw);
  height:min(600px,95vh);
  margin:10px;
  border:1px solid #ccc;
}
svg{width:100%;height:100%;display:block;}
</style>
</head>

<body>

<div class="wrap">
<svg id="svg" preserveAspectRatio="xMidYMid meet">
  <g id="world">
    <path id="p"
      fill="rgba(0,120,255,.15)"
      stroke="#0078ff"
      fill-rule="evenodd"/>
  </g>
</svg>
</div>

<script>
  const svg = document.getElementById('svg');
  const world = document.getElementById('world');

  // --- bbox: all polygons, all rings ---
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  data.forEach(poly => poly.forEach(ring => ring.forEach(([x,y]) => {
    if(x<minX)minX=x; if(y<minY)minY=y;
    if(x>maxX)maxX=x; if(y>maxY)maxY=y;
  })));

  const pad = Math.max(maxX-minX, maxY-minY) * 0.05;
  const vb = [minX-pad, minY-pad, (maxX-minX)+pad*2, (maxY-minY)+pad*2];

  svg.setAttribute('viewBox', vb.join(' '));
  world.setAttribute('transform', `translate(0 ${vb[1]+vb[3]}) scale(1 -1)`);

// --- draw: one <path> per polygon (supports holes via evenodd) ---
data.forEach((poly) => {
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('fill', 'rgba(0,120,255,.15)');
  p.setAttribute('stroke', '#0078ff');
  p.setAttribute('fill-rule', 'evenodd');
  p.setAttribute('stroke-width', Math.max(vb[2], vb[3]) * 0.002);

  let d = '';
  poly.forEach(ring => {
    if(!ring.length) return;

    d += `M ${ring[0][0]} ${ring[0][1]}`;
    for(let i=1;i<ring.length;i++){
      d += ` L ${ring[i][0]} ${ring[i][1]}`;
    }

    d += ' Z';   // ← 關鍵：補 Z 封閉 ring
  });

  p.setAttribute('d', d);
  world.appendChild(p);
});

</script>

</body>
</html>
