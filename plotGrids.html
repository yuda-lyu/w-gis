<body>
<div id="plot"></div>

<script>

function gridToPoints(g) {
  if (!g || !Array.isArray(g.grds)) return [];

  const {
    xnum,
    xmin,
    dx,
    ynum,
    ymin,
    dy,
    grds
  } = g;

  const points = [];

  for (let yi = 0; yi < ynum; yi++) {
    for (let xi = 0; xi < xnum; xi++) {
      const z = grds[yi][xi];

      points.push({
        x: xmin + xi * dx,
        y: ymin + yi * dy,
        z: z
      });
    }
  }

  return points;
}

let data = gridToPoints(obj)

// 拆分座標
const xs = data.map(p => p.x);
const ys = data.map(p => p.y);
const zs = data.map(p => p.z);

// 3D Scatter
const trace = {
    x: xs,
    y: ys,
    z: zs,
    mode: 'markers',
    type: 'scatter3d',
    marker: {
        size: 6,
        color: zs,              // 依 z 值上色
        colorscale: 'Viridis',
        colorbar: {
            title: 'Z 值'
        }
    }
};

const layout = {
    title: '3D Scatters of Grids',
    scene: {
        xaxis: { title: 'X' },
        yaxis: { title: 'Y' },
        zaxis: { title: 'Z' },
        camera: {
          projection: { type: 'orthographic' }
        },
        aspectmode: 'manual',
        aspectratio: {
            x: 1,
            y: 1,
            z: 0.5
        },
    },
    margin: { l: 0, r: 0, b: 0, t: 40 }
};

Plotly.newPlot('plot', [trace], layout);
</script>
